services: 
  gateway-postgres:
    image: postgres:15
    container_name: gateway-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:8000:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data